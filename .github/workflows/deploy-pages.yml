name: Deploy ryon-project-command-tools to GitHub Pages
on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'index.html'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build today-work-selector
        working-directory: apps/today-work-selector
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Install & Build school-safety-checker
        working-directory: apps/school-safety-checker
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Install & Build maruflow-mock
        working-directory: apps/maruflow-mock
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Install & Build school-ops-portal
        working-directory: apps/school-ops-portal
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Install & Build manazashi-archive-demo
        working-directory: apps/manazashi-archive-demo
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Assemble dist directory
        run: |
          mkdir -p dist/today-work-selector
          mkdir -p dist/school-safety-checker
          mkdir -p dist/maruflow-mock
          mkdir -p dist/school-ops-portal
          mkdir -p dist/manazashi-archive-demo
          cp -r apps/today-work-selector/dist/*    dist/today-work-selector/
          cp -r apps/school-safety-checker/dist/*  dist/school-safety-checker/
          cp -r apps/maruflow-mock/dist/*          dist/maruflow-mock/
          cp -r apps/school-ops-portal/dist/*      dist/school-ops-portal/
          cp -r apps/manazashi-archive-demo/dist/* dist/manazashi-archive-demo/
          cp index.html dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
